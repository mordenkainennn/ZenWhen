<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenWhen Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 209, 102, 0.35), transparent 28%),
          linear-gradient(180deg, #f6f2e8 0%, #eef4f8 100%);
        color: #1c2430;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 560px;
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(28, 36, 48, 0.08);
        box-shadow: 0 20px 70px rgba(28, 36, 48, 0.07);
      }

      p {
        color: #536170;
      }
    </style>
  </head>
  <body>
    <main>
      <p>ZenWhen</p>
      <h1>You are offline</h1>
      <p>The app shell should still load after your first visit. If this page appears, reconnect and reopen ZenWhen to refresh its local cache.</p>
    </main>
  </body>
  </html>
