<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenWhen 离线提示</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 209, 102, 0.35), transparent 28%),
          linear-gradient(180deg, #f6f2e8 0%, #eef4f8 100%);
        color: #1c2430;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 560px;
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(28, 36, 48, 0.08);
        box-shadow: 0 20px 70px rgba(28, 36, 48, 0.07);
      }

      p {
        color: #536170;
        margin: 0;
      }

      .offline-copy {
        display: grid;
        gap: 12px;
      }

      .offline-copy h1 {
        margin: 0;
      }

      .offline-copy p + p {
        margin-top: -4px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="offline-copy">
        <p>ZenWhen</p>
        <h1>你当前处于离线状态</h1>
        <p>首次成功访问后，应用外壳通常仍可离线打开。如果你看到了这个页面，请恢复网络后重新打开 ZenWhen，以刷新本地缓存。</p>
        <p>You are currently offline. After the first successful visit, the app shell should still open offline. If this page appears, reconnect and reopen ZenWhen to refresh the local cache.</p>
      </div>
    </main>
  </body>
  </html>
